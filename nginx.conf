server {
    listen 80;
    server_name _;

    # Where our website files live inside the container
    root /usr/share/nginx/html;
    index index.html;

    # Serve files, fallback to index.html (good for single-page apps too)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (CSS, JS, images) for 30 days
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers — good DevOps practice
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Hide Nginx version from headers
    server_tokens off;

    # Return 404 for hidden files (like .git, .env)
    location ~ /\. {
        deny all;
    }
}
