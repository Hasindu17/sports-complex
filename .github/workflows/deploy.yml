name: Build and Deploy Sports Complex

# WHEN does this pipeline run?
on:
  push:
    branches: [ main ]      # Runs on every push to main branch
  pull_request:
    branches: [ main ]      # Also runs when someone opens a PR

jobs:
  # ── JOB 1: Build and test ──────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest   # GitHub gives us a free Ubuntu machine

    steps:
      # Step 1: Download our code onto the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image
      - name: Build Docker image
        run: docker build -t apex-sports-complex:latest .

      # Step 3: Quick smoke test — make sure Nginx starts OK
      - name: Test container starts
        run: |
          docker run -d --name test-container -p 8080:80 apex-sports-complex:latest
          sleep 3
          curl -f http://localhost:8080 || exit 1
          docker stop test-container
          docker rm test-container
          echo "✅ Site is serving correctly!"

  # ── JOB 2: Deploy to DigitalOcean (only on main branch) ───
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build                      # Only runs if 'build' job passed
    if: github.ref == 'refs/heads/main'  # Only on main, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to DigitalOcean Container Registry
      - name: Login to DO Container Registry
        run: echo "${{ secrets.DO_REGISTRY_TOKEN }}" | docker login registry.digitalocean.com -u "${{ secrets.DO_REGISTRY_TOKEN }}" --password-stdin

      # Build and tag for the registry
      - name: Build and tag image
        run: |
          docker build -t registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/apex-sports:latest .

      # Push image to DigitalOcean Container Registry
      - name: Push image to registry
        run: |
          docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/apex-sports:latest

      # SSH into Droplet and pull + restart the container
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/apex-sports:latest
            docker stop apex-sports-complex || true
            docker rm apex-sports-complex || true
            docker run -d \
              --name apex-sports-complex \
              --restart unless-stopped \
              -p 80:80 \
              registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/apex-sports:latest
            echo "✅ Deployed successfully!"
